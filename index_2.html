<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiam ❤️</title>
    <style>
        /* Ajout de box-sizing pour éviter que les paddings ne déforment les boîtes */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* min-height est plus sûr sur mobile */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(5px);
        }
        h1 {
            color: #e84393;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p.message {
            font-size: 1.2em;
            font-weight: 500;
            margin-bottom: 35px;
            color: #555;
            line-height: 1.5;
        }
        .countdown {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }
        .time-box {
            background: #e84393;
            color: white;
            padding: 15px;
            border-radius: 12px;
            min-width: 70px;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.3);
            flex: 1; /* Permet aux boîtes de partager l'espace équitablement */
        }
        .time-box span {
            display: block;
            font-size: 2.2em;
            font-weight: bold;
        }
        .time-box .label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            font-weight: normal;
        }
        .heart {
            color: #e84393;
            font-size: 3em;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .finished {
            color: #e84393;
            font-size: 1.8em;
            font-weight: bold;
            margin: 20px 0;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- CORRECTIONS POUR MOBILE --- */
        @media (max-width: 500px) {
            .container {
                padding: 25px 15px; /* On réduit l'espace intérieur */
                width: 95%;
            }
            h1 {
                font-size: 1.8em; /* Titre plus petit pour éviter de déborder */
            }
            p.message {
                font-size: 1.05em;
                margin-bottom: 25px;
            }
            .countdown {
                gap: 5px; /* Espacement réduit entre les boîtes */
            }
            .time-box {
                padding: 10px 5px;
                min-width: 0; /* On retire la largeur minimale stricte */
            }
            .time-box span {
                font-size: 1.4em; /* Chiffres plus petits */
            }
            .time-box .label {
                font-size: 0.7em; /* Texte Jours/Heures plus petit */
            }
            .heart {
                font-size: 2.2em; /* Les 4 cœurs prennent moins de place */
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Wiaaaam, my loooove ❤️</h1>
    <p class="message">Counting down the seconds until you're back in my arms. <br><b>I miss you</b> ❤️❤️</p>

    <div class="countdown" id="countdown">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Min</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Sec</div>
        </div>
    </div>

    <div class="heart">
        ❤️❤️❤️❤️
        <br>
        <img src="https://media1.tenor.com/m/Kv8DeO-NIzkAAAAC/sappy-sappy-seals.gif" alt="i miss you" width="150">
    </div>
    <p class="message">Seni seviyorum ❤️❤️</p>
</div>

<script>
    // Target date: Sunday, March 8, 2026 at 13:00:00
    const targetDate = new Date("March 8, 2026 13:00:00").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "<div class='finished'>It's time! You're finally home! 🎉❤️</div>";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days.toString().padStart(2, '0');
        document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
    }, 1000);
</script>
</body>
</html>
